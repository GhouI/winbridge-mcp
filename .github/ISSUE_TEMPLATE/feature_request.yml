name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What agent workflow or Windows operation would this unlock?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the behavior, API, or tool shape you want.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: Does this change expand remote execution, credentials, networking, or authorization?
